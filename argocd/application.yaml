apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  source:
    repoURL: https://github.com/Pratiks-96/observability-in-one-repo.git
    path: k8s
    targetRevision: HEAD
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
